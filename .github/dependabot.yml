version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      # run these when most of our developers don't work, don't DoS our CI over the day
      time: "22:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    reviewers:
      - "tphakala"
    groups:
      eslint:
        patterns:
          - "eslint*"
      esbuild:
        patterns:
          - "esbuild*"
      patternfly:
        patterns:
          - "@patternfly*"
      react:
        patterns:
          - "react*"
      stylelint:
        patterns:
          - "stylelint*"
      types:
        patterns:
          - "@types*"
          - "types*"

    ignore:
      # https://github.com/cockpit-project/cockpit/issues/21151
      - dependency-name: "sass"
        versions: [">=1.80.0", "2.x"]

      # needs to be done in Cockpit first
      - dependency-name: "@patternfly/*"
        update-types: ["version-update:semver-major"]

      # React major bumps are reviewed manually. PatternFly 6 supports React
      # 17/18/19, so this is not a hard compatibility cap; we just want major
      # React upgrades to go through a deliberate PR rather than land
      # automatically. Currently on React 19.
      - dependency-name: "*react*"
        update-types: ["version-update:semver-major"]

      # eslint-plugin-react (7.37.5, latest) supports eslint only up to ^9.7. ESLint 10
      # removed the legacy context.getFilename() API the plugin relies on, so bumping
      # eslint to 10 breaks linting (TypeError loading react rules). Hold eslint on 9.x
      # until eslint-plugin-react ships ESLint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 3
    reviewers:
      - "tphakala"
    labels:
      - "no-test"
    schedule:
      interval: "weekly"
